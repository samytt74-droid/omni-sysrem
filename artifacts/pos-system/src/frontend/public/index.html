<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="../public/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniSystem Pro - نظام المبيعات والمخزون</title>
    <!-- Tailwind Play CSS for instant, failproof, and robust desktop compilation -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import beautiful Google Arabic font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
      }
      /* Custom thin scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 selection:bg-blue-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="../src/main.jsx"></script>
  </body>
</html>
